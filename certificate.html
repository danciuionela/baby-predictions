<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gânduri pentru Adam - Adam Ștefan</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="wrapper">
<div id="certificate" class="card certificate">
<h1>🤍 Gânduri pentru Adam 🐣</h1>
<h2>Pentru Adam Ștefan 💙</h2>
<div class="baby">
💙
</div>
<hr>
<h3>Completat de</h3>
<h2 id="name"></h2>
<p id="relation"></p>
<hr>
<div class="details">
<p>📅 Data: <span id="date"></span></p>
<p>⚖️ Greutate: <span id="weight"></span></p>
<p>📏 Lungime: <span id="height"></span></p>
<p>👶 Păr: <span id="hair"></span></p>
<p>👀 Ochi: <span id="eyes"></span></p>
<p>❤️ Va semăna cu: <span id="look"></span></p>
<p>😊 Personalitate: <span id="personality"></span></p>
<p>🗣 Primul cuvânt: <span id="word"></span></p>
<p>⭐ Profesie: <span id="job"></span></p>
</div>
<hr>
<div class="message">
<h3>💌 Mesaj pentru Adam</h3>
<p id="message"></p>
</div>
<hr>
<button onclick="downloadPNG()">
🖼 Salvează amintirea
</button>
</div>
</div>
<script>
const data =
JSON.parse(
localStorage.getItem("adamPrediction")
);
if(data){
document.getElementById("name").innerText =
data.name.toUpperCase();
document.getElementById("relation").innerText =
data.relation || "";
document.getElementById("date").innerText =
data.date;
document.getElementById("weight").innerText =
data.weight;
document.getElementById("height").innerText =
data.height;
document.getElementById("hair").innerText =
data.hair;
document.getElementById("eyes").innerText =
data.eyes;
document.getElementById("look").innerText =
data.look;
document.getElementById("personality").innerText =
data.personality;
document.getElementById("word").innerText =
data.word;
document.getElementById("job").innerText =
data.job;
document.getElementById("message").innerText =
data.message;
}
function downloadPNG(){
html2canvas(
document.getElementById("certificate"),
{
    scale:3,
    backgroundColor:"#ffffff"
}
)
.then(async canvas => {
canvas.toBlob(async blob => {
const file = new File(
[blob],
"Ganduri-pentru-Adam-Stefan.png",
{
type:"image/png"
}
);
/* Android + iPhone Share */
if(
navigator.share &&
navigator.canShare &&
navigator.canShare({files:[file]})
){
try {
await navigator.share({
title:"Gânduri pentru Adam 💙",
text:"O amintire pentru Adam Ștefan",
files:[file]
});
return;
}
catch(error){
console.log("Partajare anulată");
}
}
/* Varianta descărcare */
const url =
URL.createObjectURL(blob);
const link =
document.createElement("a");
link.href=url;
link.download =
"Ganduri-pentru-Adam-Stefan.png";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
setTimeout(()=>{
URL.revokeObjectURL(url);
},1000);
}, "image/png");
});
}
</script>
</body>
</html>
