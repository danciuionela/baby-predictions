<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Predictions - Adam Ștefan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">
<div class="card">
<h1>🤍 Baby Predictions</h1>
<h2>Pentru Adam Ștefan 💙</h2>
<p class="intro">
Completează predicția ta înainte de venirea pe lume a lui Adam.
</p>
<form id="predictionForm">
<label>Numele tău *</label>
<input id="name" required>
<label>Relația cu Adam</label>
<select id="relation">
<option>Prieten</option>
<option>Familie</option>
<option>Colegu</option>
<option>Naș</option>
<option>Altă relație</option>
</select>
<div class="row">
<div>
<label>📅 Luna</label>
<input id="month">
</div>
<div>
<label>Ziua</label>
<input id="day">
</div>
</div>
<label>⚖️ Greutate</label>
<input id="weight" placeholder="ex: 3400 g">
<label>📏 Lungime</label>
<input id="height" placeholder="ex: 51 cm">
<label>👶 Păr</label>
<input id="hair">
<label>👀 Ochii</label>
<input id="eyes">
<label>❤️ Va semăna cu</label>
<select id="look">
<option>Mama</option>
<option>Tata</option>
<option>Amândoi</option>
</select>
<label>😊 Personalitate</label>
<div class="checks">
<label><input type="checkbox" value="Calm"> Calm</label>
<label><input type="checkbox" value="Poznaș"> Poznaș</label>
<label><input type="checkbox" value="Curajos"> Curajos</label>
<label><input type="checkbox" value="Somnoros"> Somnoros</label>
<label><input type="checkbox" value="Vorbăreț"> Vorbăreț</label>
<label><input type="checkbox" value="Independent"> Independent</label>
</div>
<label>🗣 Primul cuvânt</label>
<input id="word">
<label>⭐ Ce profesie va avea?</label>
<input id="job">
<label>💌 Mesaj pentru Adam</label>
<textarea id="message"></textarea>
<button type="button" onclick="generateCertificate()">
✨ Generează certificatul
</button>
</form>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
